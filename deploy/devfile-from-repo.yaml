schemaVersion: 2.2.2
metadata:
  name: repo-fascinator
  displayName: Git Repository + Fascinator
  description: Clone a repository and collaborate on it with multi-user editing
  language: TypeScript

projects:
  - name: my-project
    git:
      remotes:
        origin: https://github.com/example/my-project.git
      checkoutFrom:
        revision: main
  - name: fascinator
    git:
      remotes:
        origin: https://github.com/chapeaux/fascinator.git
      checkoutFrom:
        revision: main

components:
  - name: tools
    container:
      image: quay.io/devfile/universal-developer-image:ubi9-latest
      memoryLimit: 4G
      cpuLimit: "2"
      mountSources: true
      env:
        - name: DENO_INSTALL
          value: /home/user/.deno
        - name: PATH
          value: /home/user/.deno/bin:/home/user/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
        - name: FASCINATOR_SERVER_PORT
          value: "3078"
        - name: FASCINATOR_MANAGER_PORT
          value: "3079"
        - name: FASCINATOR_HOST_PORT
          value: "3200"
        - name: FASCINATOR_DATA_DIR
          value: /projects/.fascinator-data
        - name: FASCINATOR_HOST_NAME
          value: Developer
      endpoints:
        - name: app
          targetPort: 8080
          exposure: public
          protocol: https
        - name: fascinator-mgr
          targetPort: 3079
          exposure: public
          protocol: https
        - name: fascinator-ws
          targetPort: 3078
          exposure: internal

commands:
  - id: fascinator-setup
    exec:
      label: Setup and Start Fascinator
      component: tools
      commandLine: /projects/fascinator/scripts/setup.sh --background
      workingDir: /projects/fascinator
      group:
        kind: run
        isDefault: true

  - id: build-project
    exec:
      label: Build Project
      component: tools
      workingDir: /projects/my-project
      commandLine: echo "Replace this with your project's build command"
      group:
        kind: build

  - id: run-project
    exec:
      label: Run Project
      component: tools
      workingDir: /projects/my-project
      commandLine: echo "Replace this with your project's run command"
      group:
        kind: run

events:
  postStart:
    - fascinator-setup

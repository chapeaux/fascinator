schemaVersion: 2.2.2
metadata:
  name: deno-fascinator
  displayName: Deno + Fascinator
  description: Deno development workspace with multi-user collaborative editing
  language: TypeScript

components:
  - name: tools
    container:
      image: quay.io/devfile/universal-developer-image:ubi9-latest
      memoryLimit: 4G
      cpuLimit: "2"
      mountSources: true
      volumeMounts:
        - name: fascinator-data
          path: /data
      env:
        - name: DENO_DIR
          value: /home/user/.deno
        - name: FASCINATOR_SERVER_PORT
          value: "3078"
        - name: FASCINATOR_MANAGER_PORT
          value: "3079"
        - name: FASCINATOR_HOST_PORT
          value: "3100"
        - name: FASCINATOR_DATA_DIR
          value: /data
        - name: FASCINATOR_HOST_NAME
          value: Developer
      endpoints:
        - name: deno-app
          targetPort: 8000
          exposure: public
          protocol: https
        - name: fascinator-mgr
          targetPort: 3079
          exposure: public
          protocol: https
        - name: fascinator-ws
          targetPort: 3078
          exposure: internal

  - name: fascinator-data
    volume:
      size: 1Gi

commands:
  - id: fascinator-setup
    exec:
      label: Setup and Start Fascinator
      component: tools
      workingDir: ${PROJECTS_ROOT}/fascinator
      commandLine: ./scripts/setup.sh
      group:
        kind: run
        isDefault: true

  - id: deno-run
    exec:
      label: Run Deno App
      component: tools
      workingDir: ${PROJECTS_ROOT}
      commandLine: deno run --allow-all main.ts
      group:
        kind: run

  - id: deno-test
    exec:
      label: Run Deno Tests
      component: tools
      workingDir: ${PROJECTS_ROOT}
      commandLine: deno test --allow-all
      group:
        kind: test

events:
  postStart:
    - fascinator-setup

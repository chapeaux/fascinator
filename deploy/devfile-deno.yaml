schemaVersion: 2.2.2
metadata:
  name: deno-fascinator
  displayName: Deno + Fascinator
  description: Deno development workspace with multi-user collaborative editing
  language: TypeScript

projects:
  - name: fascinator
    git:
      remotes:
        origin: https://github.com/chapeaux/fascinator.git
      checkoutFrom:
        revision: main

components:
  - name: tools
    container:
      image: quay.io/devfile/universal-developer-image:ubi9-latest
      memoryLimit: 4G
      cpuLimit: "2"
      mountSources: true
      env:
        - name: DENO_INSTALL
          value: /home/user/.deno
        - name: PATH
          value: /home/user/.deno/bin:/home/user/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
        - name: FASCINATOR_SERVER_PORT
          value: "3078"
        - name: FASCINATOR_MANAGER_PORT
          value: "3079"
        - name: FASCINATOR_HOST_PORT
          value: "3200"
        - name: FASCINATOR_DATA_DIR
          value: /projects/.fascinator-data
        - name: FASCINATOR_HOST_NAME
          value: Developer
      endpoints:
        - name: deno-app
          targetPort: 8000
          exposure: public
          protocol: https
        - name: fascinator-mgr
          targetPort: 3079
          exposure: public
          protocol: https
        - name: fascinator-ws
          targetPort: 3078
          exposure: internal

commands:
  - id: fascinator-setup
    exec:
      label: Setup and Start Fascinator
      component: tools
      commandLine: /projects/fascinator/scripts/setup.sh --background
      workingDir: /projects/fascinator
      group:
        kind: run
        isDefault: true

  - id: deno-run
    exec:
      label: Run Deno App
      component: tools
      workingDir: ${PROJECT_SOURCE}
      commandLine: deno run --allow-all main.ts
      group:
        kind: run

  - id: deno-test
    exec:
      label: Run Deno Tests
      component: tools
      workingDir: ${PROJECT_SOURCE}
      commandLine: deno test --allow-all
      group:
        kind: test

events:
  postStart:
    - fascinator-setup

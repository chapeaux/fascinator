schemaVersion: 2.2.2
metadata:
  name: fascinator-workspace
  displayName: Fascinator Collaborative Workspace
  description: Multi-user collaborative editing environment powered by Yjs CRDTs
  language: TypeScript

components:
  - name: tools
    container:
      image: quay.io/devfile/universal-developer-image:ubi9-latest
      memoryLimit: 4G
      cpuLimit: "2"
      mountSources: true
      env:
        - name: DENO_INSTALL
          value: /home/user/.deno
        - name: PATH
          value: /home/user/.deno/bin:/home/user/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
        - name: FASCINATOR_SERVER_PORT
          value: "3078"
        - name: FASCINATOR_MANAGER_PORT
          value: "3079"
        - name: FASCINATOR_HOST_PORT
          value: "3200"
        - name: FASCINATOR_DATA_DIR
          value: /projects/.fascinator-data
        - name: FASCINATOR_HOST_NAME
          value: Developer
      endpoints:
        - name: fascinator-mgr
          targetPort: 3079
          exposure: public
          protocol: https
        - name: fascinator-ws
          targetPort: 3078
          exposure: internal

commands:
  - id: fascinator-setup
    exec:
      label: Setup and Start Fascinator
      component: tools
      commandLine: /projects/fascinator/scripts/setup.sh --background
      workingDir: /projects/fascinator
      group:
        kind: run
        isDefault: true

  - id: build-extension
    exec:
      label: Build Extension
      component: tools
      workingDir: /projects/fascinator/packages/extension
      commandLine: npm run package
      group:
        kind: build

events:
  postStart:
    - fascinator-setup

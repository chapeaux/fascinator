schemaVersion: 2.2.2
metadata:
  name: node-fascinator
  displayName: Node.js + Fascinator
  description: Node.js development workspace with multi-user collaborative editing
  language: JavaScript

components:
  - name: tools
    container:
      image: quay.io/devfile/universal-developer-image:ubi9-latest
      memoryLimit: 4G
      cpuLimit: "2"
      mountSources: true
      volumeMounts:
        - name: fascinator-data
          path: /data
      env:
        - name: NODE_ENV
          value: development
        - name: FASCINATOR_SERVER_PORT
          value: "3078"
        - name: FASCINATOR_MANAGER_PORT
          value: "3079"
        - name: FASCINATOR_HOST_PORT
          value: "3100"
        - name: FASCINATOR_DATA_DIR
          value: /data
        - name: FASCINATOR_HOST_NAME
          value: Developer
      endpoints:
        - name: node-app
          targetPort: 3000
          exposure: public
          protocol: https
        - name: fascinator-mgr
          targetPort: 3079
          exposure: public
          protocol: https
        - name: fascinator-ws
          targetPort: 3078
          exposure: internal

  - name: fascinator-data
    volume:
      size: 1Gi

commands:
  - id: fascinator-setup
    exec:
      label: Setup and Start Fascinator
      component: tools
      workingDir: ${PROJECTS_ROOT}/fascinator
      commandLine: ./scripts/setup.sh
      group:
        kind: run
        isDefault: true

  - id: npm-install
    exec:
      label: Install Dependencies
      component: tools
      workingDir: ${PROJECTS_ROOT}
      commandLine: npm install
      group:
        kind: build
        isDefault: true

  - id: npm-start
    exec:
      label: Start Node App
      component: tools
      workingDir: ${PROJECTS_ROOT}
      commandLine: npm start
      group:
        kind: run

  - id: npm-test
    exec:
      label: Run Tests
      component: tools
      workingDir: ${PROJECTS_ROOT}
      commandLine: npm test
      group:
        kind: test

events:
  postStart:
    - fascinator-setup
